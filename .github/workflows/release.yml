name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist/wheel (sanity check -- validates pyproject.toml)
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Checksum installer scripts
        run: sha256sum install.sh install.ps1 > SHA256SUMS

      - name: Create GitHub Release with installer assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1
            SHA256SUMS
            dist/*
          generate_release_notes: true
